<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logging Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #log {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
            height: 200px;
            overflow-y: scroll;
        }
    </style>
</head>
<body>
    <h1>Logging Example</h1>
    <button id="logButton">Log Message</button>
    <a id="downloadLink" style="display: none;">Download Log</a>
    <div id="log"></div>

    <script>
        const logs = [];

        // Function to log messages
        function logMessage(message) {
            const timestamp = new Date().toISOString();
            const logEntry = `${timestamp}: ${message}`;
            console.log(logEntry); // Log to console
            logs.push(logEntry); // Store log entry
            updateLogDisplay(); // Update the log display
        }

        // Function to update the log display
        function updateLogDisplay() {
            const logDiv = document.getElementById('log');
            logDiv.innerHTML = logs.join('<br>'); // Display logs in the div
        }

        // Event listener for logging a message
        document.getElementById('logButton').addEventListener('click', () => {
            logMessage('User clicked the log button');
            createDownloadLink(); // Create download link after logging
        });

        // Function to create a downloadable log file
        function createDownloadLink() {
            const blob = new Blob([logs.join('\n')], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = url;
            downloadLink.download = 'app.log';
            downloadLink.style.display = 'block'; // Show the download link
            downloadLink.innerText = 'Download Log';
        }
    </script>
</body>
</html>
